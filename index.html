<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Norway Road Trip Map</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  
  <!-- Custom Fonts (Google Fonts: Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>Norway Road Trip</h1>
        <p>30 May - 12 June 2026</p>
        <div class="button-group">
<button id="open-itinerary-btn" class="read-btn">📖 Full Itinerary</button>
          <button id="open-guide-btn" class="read-btn">💡 Trip Guide</button>
        </div>
      </div>
      
      <div class="days-list" id="days-list">
        <!-- Day cards will be generated by JavaScript -->
      </div>
    </aside>

    <main class="map-container">
      <div id="map"></div>
      
      <div class="mobile-nav" id="mobile-nav">
        <button class="mobile-nav-btn" id="mobile-nav-select-day">🗺️ Select Day</button>
        <button class="mobile-nav-btn" id="mobile-nav-itinerary">📖 Itinerary</button>
        <button class="mobile-nav-btn" id="mobile-nav-guide">💡 Guide</button>
      </div>
    </main>
  </div>

  <!-- Itinerary Modal -->
  <div id="itinerary-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <div class="lang-toggle">
          <button id="lang-th" class="lang-btn active">Thai</button>
          <button id="lang-en" class="lang-btn">English</button>
        </div>
        <button id="close-modal-btn" class="close-btn">&times;</button>
      </div>
      <div id="markdown-content" class="modal-body"></div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <!-- Leaflet Ant Path for animation -->
  <script src="https://cdn.jsdelivr.net/npm/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.js"></script>
  <!-- Marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <!-- Markdown content (loaded as JS to work with file:// protocol) -->
  <script src="itinerary_th.js"></script>
  <script src="itinerary_en.js"></script>
  <script src="guide_th.js"></script>
  <script src="guide_en.js"></script>

  <!-- Custom JS -->
  <script src="script.js"></script>
</body>
</html>
